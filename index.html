<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker | Login</title>

    <!-- favicon  -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon" />

    <!-- DaisyUi & Tailwind  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="mx-auto">
    <div id="login-parent" class="login-form pt-10">
      <fieldset
        class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 rounded-2xl mx-auto"
      >
        <div class="flex justify-center items-center flex-col mx-auto ">
      <img class="w-[100px]" src="./assets/github-logo.png" alt="" />
      <h1>GitHub Issues Tracker</h1>
      <p class="text-[#64748B]">Sign in to manage your issues</p>
    </div>
        <label class="label text-neutral font-bold">Username</label>
        <input
          id="input-number"
          type="text"
          class="input"
          placeholder="Enter Your user Name "
          value="admin"
        />

        <label class="label text-neutral font-bold">Password </label>
        <input
          id="pin"
          type="password"
          class="input"
          placeholder="Password"
          
        />

        <button id="login-btn" class="btn btn btn-primary rounded-full mt-4">
          Sign In
        </button>
        <p class="text-center">OR</p>
        <p class="text-[#64748B] text-center">Demo Credentials:</p>
        <div class="bg-base-200 text-center">
          <p>Username: admin</p>
          <p>Password: admin123</p>
        </div>
      </fieldset>
    </div>

    <script src="./js/script.js"></script>
  </body>
</html>
