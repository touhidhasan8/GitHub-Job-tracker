<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker | Home</title>

    <!-- favicon  -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Tailwind and daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <style>
    .active {
      background-color: #4a00ff;
      color: white;
    }
  </style>
  <body class="bg-[#F8FAFC]">
    <!-- Navbar -->
    <nav class="bg-white border-b">
      <div
        class="max-w-6xl mx-auto flex items-center justify-between py-4 px-4"
      >
        <!-- Logo + Title -->
        <div class="flex items-center gap-3">
          <img class="w-[36px]" src="./assets/github-logo.png" alt="" />
          <h1 class="font-semibold text-2xl">GitHub Issues Tracker</h1>
        </div>

        <!-- Search -->
        <div>
          <div class="join">
            <div>
              <label class="input validator search card ">
                
                  <g
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    stroke-width="2.5"
                    fill="none"
                    stroke="currentColor"
                  >
                    <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                  </g>
                
                <input type="text" placeholder="Search issues..." required />
              </label>
              <div class="validator-hint hidden">Enter valid email address</div>
            </div>
            <button class="btn btn-neutral join-item">Join</button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Filter Buttons -->
    <section class="max-w-6xl mx-auto mt-8 px-4">
      <div class="flex gap-3 mb-6">
        <button
          id="allbtn"
          class="btn btn-outline bg-[#4A00FF] text-white border-[#4A00FF]"
        >
          All
        </button>
        <button id="openBtn" class="btn btn-outline btn-primary">Open</button>
        <button id="closeBtn" class="btn btn-outline btn-primary">
          Closed
        </button>
      </div>

      <!-- Issues -->

      <div class="flex justify-between mb-5">
        <div class="flex gap-2 items-center">
          <img class="w-[45px]" src="./assets/Aperture.png" alt="" />
          <div>
            <h1 class="font-semibold text-xl">
              <span id="cardCounter">0</span> Issues
            </h1>
            <p class="text-[#64748B]">Track and manage your project issues</p>
          </div>
        </div>
        <!-- Open Close Status   -->
        <div class="flex items-center gap-2">
          <div class="open flex items-center">
            <img class="w-5 h-5" src="./assets/Open-Status.png" alt="" />
            <h1>Open</h1>
          </div>
          <div class="close flex items-center">
            <img class="w-5 h-5" src="./assets/Closed- Status .png" alt="" />
            <h1>Close</h1>
          </div>
        </div>
      </div>
      <!-- Loading FallBack  -->
      <div id="loadingEffect" class="hidden justify-center">
        <span class="loading loading-dots loading-xl"></span>
      </div>
      <!-- Cards -->
      <div id="cardSection" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
      <!-- modal -->


     
       <div id="modals">
        <!-- Open the modal using ID.showModal() method -->
        
       </div>
    </section>
    <script src="./js/home.js"></script>
  </body>
</html>
